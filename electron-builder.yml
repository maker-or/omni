appId: com.maker-or.omni
productName: Pipper Code (Alpha)
directories:
  output: release
files:
  - out/**/*
  - package.json
  - app-template
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**/*"
  - "**/node_modules/@agentclientprotocol/codex-acp/**/*"
  - "**/node_modules/@openai/codex*/**/*"
mac:
  artifactName: pipper-${version}-${arch}.${ext}
  # Set to null to skip local macOS code signing, speeding up local DMG builds by 10x.
  # Comment or remove this option when you are ready to distribute and sign with a Developer ID Certificate.
  identity: null
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist

win:
  artifactName: pipper-${version}-win-${arch}.${ext}
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
