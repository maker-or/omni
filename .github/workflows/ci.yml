name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Separate steps on purpose: the default Windows shell (pwsh) only
      # propagates the *last* command's exit code, so a `run: |` block would
      # let a failing fmt:check or lint pass silently as long as tests passed.
      - name: Check formatting
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
